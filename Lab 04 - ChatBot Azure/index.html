<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atendimento - FAQ Empresa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep:       #0b0e11;
      --bg-panel:      #111518;
      --bg-sidebar:    #161b21;
      --bg-header:     #1a2028;
      --bg-input:      #1e252e;
      --bg-user:       #1a4731;
      --bg-bot:        #1e252e;
      --accent:        #25d366;
      --accent-dim:    #128c4a;
      --text-primary:  #e9edef;
      --text-secondary:#8696a0;
      --text-meta:     #54656f;
      --border:        #2a3942;
      --bubble-radius: 12px;
      --shadow:        0 2px 16px rgba(0,0,0,.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Chat Container ─────────────────────────────────── */
    .chat-shell {
      position: relative;
      z-index: 1;
      width: min(780px, 100vw);
      height: min(680px, 100dvh);
      background: var(--bg-panel);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,.03);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────────────────────── */
    .chat-header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-dim) 0%, var(--accent) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(37,211,102,.25);
    }

    .header-info { flex: 1 }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .3px;
      color: var(--text-primary);
    }

    .header-status {
      font-size: 11px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.8); }
    }

    .header-badge {
      background: rgba(37,211,102,.12);
      border: 1px solid rgba(37,211,102,.2);
      color: var(--accent);
      font-size: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ─── Messages Area ───────────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg-panel);
      background-image:
        radial-gradient(circle at 15% 85%, rgba(37,211,102,.04) 0%, transparent 50%),
        radial-gradient(circle at 85% 15%, rgba(37,211,102,.03) 0%, transparent 50%);
    }

    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    /* ─── Bubbles ─────────────────────────────────────────── */
    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: slideIn .18s ease-out both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { align-self: flex-end; align-items: flex-end; }
    .msg-row.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--bubble-radius);
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
      position: relative;
    }

    .msg-row.user .bubble {
      background: var(--bg-user);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
    }

    .msg-row.bot .bubble {
      background: var(--bg-bot);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .msg-row.user .bubble::after {
      content: '';
      position: absolute;
      right: -7px; bottom: 0;
      border: 7px solid transparent;
      border-bottom-color: var(--bg-user);
      border-right: 0;
    }

    .msg-row.bot .bubble::after {
      content: '';
      position: absolute;
      left: -7px; bottom: 0;
      border: 7px solid transparent;
      border-bottom-color: var(--bg-bot);
      border-left: 0;
    }

    .msg-meta {
      font-size: 10.5px;
      color: var(--text-meta);
      margin-top: 3px;
      padding: 0 2px;
    }

    .msg-row.user .msg-meta { text-align: right; }

    /* ─── Typing Indicator ────────────────────────────────── */
    .typing-bubble {
      background: var(--bg-bot);
      border: 1px solid var(--border);
      border-radius: var(--bubble-radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--text-meta);
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.3s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .15s; }
    .typing-bubble span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); background: var(--text-meta); }
      30%            { transform: translateY(-6px); background: var(--accent); }
    }

    /* ─── Error bubble ────────────────────────────────────── */
    .bubble.error {
      background: rgba(220,53,69,.12);
      border-color: rgba(220,53,69,.3);
      color: #f87d89;
    }

    /* ─── Date Divider ────────────────────────────────────── */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--text-meta);
      font-family: 'Syne', sans-serif;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin: 6px 0;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Input Bar ──────────────────────────────────────── */
    .chat-footer {
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      transition: border-color .2s;
    }

    .input-wrap:focus-within { border-color: rgba(37,211,102,.4); }

    #msgInput {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13.5px;
      flex: 1;
      padding: 12px 0;
      caret-color: var(--accent);
    }

    #msgInput::placeholder { color: var(--text-meta); }

    .send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--accent-dim) 0%, var(--accent) 100%);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 2px 10px rgba(37,211,102,.3);
    }

    .send-btn:hover  { transform: scale(1.06); box-shadow: 0 4px 16px rgba(37,211,102,.45); }
    .send-btn:active { transform: scale(.96); }

    .send-btn svg { width: 20px; height: 20px; }

    /* ─── Welcome message ─────────────────────────────────── */
    .welcome-card {
      align-self: center;
      background: rgba(37,211,102,.06);
      border: 1px solid rgba(37,211,102,.12);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 12.5px;
      color: var(--text-secondary);
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
      margin: 4px auto 6px;
    }

    .welcome-card strong { color: var(--accent); display: block; font-family: 'Syne', sans-serif; font-size: 13px; margin-bottom: 4px; }

    /* Responsive */
    @media (max-width: 600px) {
      .chat-shell { border-radius: 0; height: 100dvh; width: 100vw; }
      .msg-row { max-width: 90%; }
    }
  </style>
</head>
<body>

<div class="chat-shell">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">FA</div>
    <div class="header-info">
      <div class="header-title">Atendimento — FAQ Empresa</div>
      <div class="header-status">
        <span class="status-dot"></span>
        online agora
      </div>
    </div>
    <div class="header-badge">IA</div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">

    <div class="date-divider">Hoje</div>

    <div class="welcome-card">
      <strong>👋 Olá! Como posso ajudar?</strong>
      Digite sua dúvida abaixo e nossa IA irá respondê-la com base na base de conhecimento da empresa.
    </div>

  </div>

  <!-- Footer / Input -->
  <div class="chat-footer">
    <div class="input-wrap">
      <input type="text" id="msgInput" placeholder="Digite sua mensagem…" autocomplete="off"/>
    </div>
    <button class="send-btn" id="sendBtn" title="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ─── CONFIG ────────────────────────────────────────────────
  const API_ENDPOINT = "https://alinebernardino.cognitiveservices.azure.com/language/:query-knowledgebases?projectName=AlineBernardino&api-version=2021-10-01&deploymentName=test"
  const API_KEY      = "8e9IxIcBwnUgORr5iUnuMgvMMxs2BovX4XPFr4QEbT4JIbdnXlz7JQQJ99CCACrIdLPXJ3w3AAAaACOGBHEz";
  const DEFAULT_MSG  = 1

  // ─── DOM ────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const input      = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');

  // ─── UTILS ──────────────────────────────────────────────────
  function now() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ─── RENDER FUNCTIONS ───────────────────────────────────────
  function appendUserMsg(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="bubble">${escHtml(text)}</div>
      <div class="msg-meta">${now()} ✓✓</div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';
    row.innerHTML = `
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function appendBotMsg(text, isError = false) {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `
      <div class="bubble ${isError ? 'error' : ''}">${escHtml(text)}</div>
      <div class="msg-meta">${now()}</div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  // ─── DISABLE / ENABLE INPUT ─────────────────────────────────
  function setInputState(disabled) {
    input.disabled  = disabled;
    sendBtn.disabled = disabled;
    sendBtn.style.opacity = disabled ? '.5' : '1';
  }

  // ─── SEND MESSAGE ───────────────────────────────────────────
  async function sendMessage() {
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    appendUserMsg(question);
    setInputState(true);

    const typingRow = showTyping();

    try {
      const response = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Ocp-Apim-Subscription-Key': API_KEY
        },
        body: JSON.stringify({ top: 1, question })
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status} — ${response.statusText}`);
      }

      const data = await response.json();
      removeTyping();

      const answer =
        data?.answers?.[0]?.answer?.trim() ||
        DEFAULT_MSG;

      appendBotMsg(answer);

    } catch (err) {
      removeTyping();
      appendBotMsg(`⚠️ Erro ao conectar com o serviço: ${err.message}`, true);
      console.error('[FAQ Chat]', err);
    } finally {
      setInputState(false);
      input.focus();
    }
  }

  // ─── EVENTS ─────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.focus();
</script>
</body>
</html>
