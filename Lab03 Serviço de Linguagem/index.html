<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Azure AI Language - Análise de Texto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4e73df, #6f42c1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 1100px;
        }

        .card-action {
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 15px;
            color: white;
        }

        .card-action:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .card-body i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        #resultado {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            background: #f8f9fa;
            min-height: 80px;
        }

        textarea {
            resize: none;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h2 class="text-center mb-4">Azure AI Language - Análise de Texto</h2>

    <div class="mb-4">
        <textarea id="texto" class="form-control" rows="4" placeholder="Digite seu texto aqui..."></textarea>
    </div>

    <div class="row g-4 text-center">

        <div class="col-md-3">
            <div class="card card-action bg-primary" onclick="analisarSentimento()">
                <div class="card-body">
                    <i class="fa-solid fa-face-smile"></i>
                    <h5>Analisar Sentimento</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-action bg-success" onclick="extrairPalavrasChave()">
                <div class="card-body">
                    <i class="fa-solid fa-key"></i>
                    <h5>Extrair Palavras-chave</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-action bg-warning" onclick="reconhecerEntidades()">
                <div class="card-body">
                    <i class="fa-solid fa-users"></i>
                    <h5>Reconhecer Entidades</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-action bg-danger" onclick="resumirTexto()">
                <div class="card-body">
                    <i class="fa-solid fa-file-lines"></i>
                    <h5>Resumir Texto</h5>
                </div>
            </div>
        </div>

    </div>

    <div id="resultado" class="mt-4">
        <strong>Resultado aparecerá aqui...</strong>
    </div>
</div>

<script>

const endpoint = "https://linguagempedro.cognitiveservices.azure.com/";
const apiKey = "3Vx8RkYaWaiPJCxSjA8noQMSo4PXvh7rn25yxQPeWP1diyOchR36JQQJ99CCACHrzpqXJ3w3AAAaACOGlAVD";

function getTexto() {
    return document.getElementById("texto").value;
}

function exibirResultado(html) {
    document.getElementById("resultado").innerHTML = html;
}

function exibirErro(erro) {
    exibirResultado(`<div class="text-danger"><strong>Erro:</strong> ${erro}</div>`);
}

async function chamarAPI(path, body) {
    try {
        const response = await fetch(endpoint + path, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Ocp-Apim-Subscription-Key": apiKey
            },
            body: JSON.stringify(body)
        });

        if (!response.ok) {
            throw new Error(`Erro HTTP: ${response.status}`);
        }

        return await response.json();

    } catch (error) {
        exibirErro(error.message);
        throw error;
    }
}

function criarBody(texto) {
    return {
        documents: [
            {
                id: "1",
                language: "pt",
                text: texto
            }
        ]
    };
}

async function analisarSentimento() {
    const texto = getTexto();
    if (!texto) return exibirErro("Digite um texto.");

    const data = await chamarAPI("/text/analytics/v3.1/sentiment", criarBody(texto));

    const doc = data.documents[0];
    exibirResultado(`
        <h5>Sentimento: ${doc.sentiment}</h5>
        <p>Confiança:</p>
        <ul>
            <li>Positivo: ${doc.confidenceScores.positive}</li>
            <li>Neutro: ${doc.confidenceScores.neutral}</li>
            <li>Negativo: ${doc.confidenceScores.negative}</li>
        </ul>
    `);
}

async function extrairPalavrasChave() {
    const texto = getTexto();
    if (!texto) return exibirErro("Digite um texto.");

    const data = await chamarAPI("/text/analytics/v3.1/keyPhrases", criarBody(texto));

    const frases = data.documents[0].keyPhrases;
    exibirResultado(`<h5>Palavras-chave:</h5><ul>${frases.map(f => `<li>${f}</li>`).join("")}</ul>`);
}

async function reconhecerEntidades() {
    const texto = getTexto();
    if (!texto) return exibirErro("Digite um texto.");

    const data = await chamarAPI("/text/analytics/v3.1/entities/recognition/general", criarBody(texto));

    const entidades = data.documents[0].entities;
    exibirResultado(`
        <h5>Entidades Reconhecidas:</h5>
        <ul>
            ${entidades.map(e => `<li>${e.text} (${e.category})</li>`).join("")}
        </ul>
    `);
}

async function resumirTexto() {
    const texto = getTexto();
    if (!texto) return exibirErro("Digite um texto.");

    try {
        const response = await fetch(endpoint + "/language/analyze-text/jobs?api-version=2023-04-01", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Ocp-Apim-Subscription-Key": apiKey
            },
            body: JSON.stringify({
                displayName: "Resumo",
                analysisInput: {
                    documents: [
                        {
                            id: "1",
                            language: "pt",
                            text: texto
                        }
                    ]
                },
                tasks: [
                    {
                        kind: "ExtractiveSummarization",
                        parameters: { sentenceCount: 3 }
                    }
                ]
            })
        });

        if (!response.ok) throw new Error("Erro ao iniciar sumarização.");

        const operationLocation = response.headers.get("operation-location");

        let status = "running";
        let result;

        while (status === "running" || status === "notStarted") {
            await new Promise(r => setTimeout(r, 2000));

            const poll = await fetch(operationLocation, {
                headers: { "Ocp-Apim-Subscription-Key": apiKey }
            });

            result = await poll.json();
            status = result.status;
        }

        if (status !== "succeeded") {
            throw new Error("Falha na sumarização.");
        }

        const sentences = result.tasks.items[0].results.documents[0].sentences;

        exibirResultado(`
            <h5>Resumo:</h5>
            <ul>
                ${sentences.map(s => `<li>${s.text}</li>`).join("")}
            </ul>
        `);

    } catch (error) {
        exibirErro(error.message);
    }
}

</script>

</body>
</html>
